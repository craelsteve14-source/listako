<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ListaKo" />
    <meta name="theme-color" content="#0A1B1E" />
    <meta name="description" content="The Operating System for Every Filipino Business — POS, inventory, staff, reports, and growth." />
    <meta name="format-detection" content="telephone=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700;800;900&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/logo-mark.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icon-192.png" />
    <title>ListaKo</title>
    <style>
      body {
        margin: 0;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        overscroll-behavior-y: contain;
        font-family: 'Inter', system-ui, sans-serif;
      }
      html { background-color: #F5F3EC; }
      html.light { background-color: #F5F3EC; }
      html, body { overflow: hidden; height: 100%; }
      #root { overflow: auto; height: 100%; -webkit-overflow-scrolling: touch; }
      ::selection { background: #B9960C33; }

      #splash {
        position: fixed;
        inset: 0;
        background: #0A1B1E;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease-out;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash .logo-mark {
        width: 100px; height: 100px;
      }
      #splash .logo-mark img { width: 100px; height: 100px; object-fit: contain; }
      #splash h1 {
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        font-size: 28px;
        color: #F0EDE5;
        margin: 20px 0 4px;
        letter-spacing: -0.5px;
      }
      #splash h1 span {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        color: #B9960C;
      }
      #splash p {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        color: rgba(240,237,229,0.4);
        letter-spacing: 2.5px;
        text-transform: uppercase;
      }
      #splash .loader {
        width: 28px; height: 28px;
        border: 2.5px solid #1A3428;
        border-top-color: #B9960C;
        border-radius: 50%;
        margin-top: 32px;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo-mark">
        <img src="/logo-mark.png" alt="ListaKo" />
      </div>
      <h1>Lista<span>Ko</span></h1>
      <p>Business Operating System</p>
      <div class="loader"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
      const observer = new MutationObserver(() => {
        if (document.getElementById("root")?.children.length > 0) {
          const splash = document.getElementById("splash");
          if (splash) {
            splash.classList.add("hide");
            setTimeout(() => splash.remove(), 500);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById("root"), { childList: true });
    </script>
  </body>
</html>
